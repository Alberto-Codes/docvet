name: Publish to PyPI

# Triggered when release-please (or manual) creates a version tag.
# Requires RELEASE_PLEASE_TOKEN (PAT with repo scope) in release-please.yml —
# tags created by GITHUB_TOKEN do NOT trigger other workflows.
on:
  push:
    tags:
      - "v*"

# Least-privilege: read-only by default; publish jobs escalate per-job.
permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false # never cancel an in-flight publish

jobs:
  # ---------------------------------------------------------------------------
  # Build — produce sdist + wheel, validate contents, upload as artifact.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build --no-sources

      - name: Smoke test wheel
        run: |
          WHEEL=$(ls dist/*.whl)
          SIZE=$(stat --format=%s "$WHEEL")
          if [ "$SIZE" -gt 512000 ]; then
            echo "::error::Wheel size ${SIZE} bytes exceeds 500KB limit"
            exit 1
          fi
          echo "Wheel size: ${SIZE} bytes — OK"

          CONTENTS=$(unzip -l "$WHEEL")
          if echo "$CONTENTS" | grep -q "tests/"; then
            echo "::error::Wheel contains tests/ directory"
            exit 1
          fi
          if echo "$CONTENTS" | grep -q "_bmad"; then
            echo "::error::Wheel contains _bmad files"
            exit 1
          fi
          echo "Wheel contents clean — OK"

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "::error::Tag version ${TAG_VERSION} does not match pyproject.toml version ${TOML_VERSION}"
            exit 1
          fi
          echo "Version ${TAG_VERSION} matches — OK"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Publish to TestPyPI — validates the package on the staging index first.
  # Uses OIDC trusted publishing (no stored tokens).
  # ---------------------------------------------------------------------------
  publish-testpypi:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        run: uv publish --trusted-publishing always --check-url https://test.pypi.org/simple/
        env:
          UV_PUBLISH_URL: "https://test.pypi.org/legacy/"

  # ---------------------------------------------------------------------------
  # Smoke test — install from TestPyPI and verify the package works.
  # Catches packaging mistakes before they reach production PyPI.
  # ---------------------------------------------------------------------------
  smoke-test:
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - run: uv python install 3.12

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for TestPyPI index
        run: sleep 30

      - name: Create virtual environment
        run: uv venv

      - name: Install from TestPyPI
        run: |
          uv pip install \
            --index-url https://pypi.org/simple/ \
            --extra-index-url https://test.pypi.org/simple/ \
            --refresh \
            "docvet==${{ steps.version.outputs.version }}"

      - name: Verify docvet --version
        run: uv run --no-project docvet --version

      - name: Verify docvet check --help
        run: uv run --no-project docvet check --help

  # ---------------------------------------------------------------------------
  # Publish to PyPI — production release.
  # Uses OIDC trusted publishing (no stored tokens).
  # ---------------------------------------------------------------------------
  publish-pypi:
    needs: [smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/

      - name: Attest build provenance
        uses: astral-sh/attest-action@v0.0.5
        with:
          paths: dist/*

  # ---------------------------------------------------------------------------
  # Update floating v1 tag for GitHub Action consumers.
  # ---------------------------------------------------------------------------
  update-tags:
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update floating v1 tag
        run: |
          git tag -f v1
          git push origin v1 --force
