name: Publish to PyPI

# Triggered when release-please (or manual) creates a version tag.
# Requires RELEASE_PLEASE_TOKEN (PAT with repo scope) in release-please.yml —
# tags created by GITHUB_TOKEN do NOT trigger other workflows.
on:
  push:
    tags:
      - "v*"

# Least-privilege: read-only by default; publish jobs escalate per-job.
permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false # never cancel an in-flight publish

jobs:
  # ---------------------------------------------------------------------------
  # Build — produce sdist + wheel, validate contents, smoke test install.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build --no-sources

      - name: Smoke test wheel contents
        run: |
          WHEEL=$(ls dist/*.whl)
          SIZE=$(stat --format=%s "$WHEEL")
          if [ "$SIZE" -gt 512000 ]; then
            echo "::error::Wheel size ${SIZE} bytes exceeds 500KB limit"
            exit 1
          fi
          echo "Wheel size: ${SIZE} bytes — OK"

          CONTENTS=$(unzip -l "$WHEEL")
          if echo "$CONTENTS" | grep -q "tests/"; then
            echo "::error::Wheel contains tests/ directory"
            exit 1
          fi
          if echo "$CONTENTS" | grep -q "_bmad"; then
            echo "::error::Wheel contains _bmad files"
            exit 1
          fi
          echo "Wheel contents clean — OK"

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "::error::Tag version ${TAG_VERSION} does not match pyproject.toml version ${TOML_VERSION}"
            exit 1
          fi
          echo "Version ${TAG_VERSION} matches — OK"

      - name: Install and verify wheel
        run: |
          uv venv /tmp/smoke --python 3.12
          SMOKE=/tmp/smoke/bin
          uv pip install --python "$SMOKE/python" dist/*.whl
          INSTALLED=$("$SMOKE/docvet" --version)
          echo "Installed version: $INSTALLED"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$INSTALLED" != *"$TAG_VERSION"* ]]; then
            echo "::error::Installed version '$INSTALLED' doesn't contain tag version '$TAG_VERSION'"
            exit 1
          fi
          echo "Version match — OK"
          "$SMOKE/docvet" check --help > /dev/null
          echo "CLI entry point — OK"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Publish to PyPI — production release.
  # Uses OIDC trusted publishing (no stored tokens).
  # ---------------------------------------------------------------------------
  publish-pypi:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/

      - name: Attest build provenance
        uses: astral-sh/attest-action@v0.0.5
        with:
          paths: dist/*

  # ---------------------------------------------------------------------------
  # Publish MCP server to the MCP Registry.
  # Uses OIDC authentication (no stored tokens).
  # ---------------------------------------------------------------------------
  publish-mcp:
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

  # ---------------------------------------------------------------------------
  # Update floating v1 tag for GitHub Action consumers.
  # ---------------------------------------------------------------------------
  update-tags:
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update floating v1 tag
        run: |
          git tag -f v1
          git push origin v1 --force
