# Rule metadata catalog — single source of truth for all docvet rules.
# Used by docs/main.py macros hook to render consistent rule page headers.
# Schema: id, name, check, category, applies_to, summary, since, fix (all required)

- id: missing-raises
  name: Missing Raises Section
  check: enrichment
  category: required
  applies_to: functions, methods
  summary: Function raises exceptions but has no Raises section
  since: "1.0.0"
  fix: |
    Add a `Raises:` section listing each exception type and the condition that triggers it:

    ```python
    Raises:
        ValueError: If the input path is not a .toml file.
        FileNotFoundError: If the config file does not exist.
    ```

- id: missing-returns
  name: Missing Returns Section
  check: enrichment
  category: required
  applies_to: functions, methods
  summary: Function returns a value but has no Returns section
  since: "1.13.0"
  fix: |
    Add a `Returns:` section describing the type and meaning of the return value:

    ```python
    Returns:
        The parsed configuration as a dictionary.
    ```

    For functions with multiple return types, describe each possibility:

    ```python
    Returns:
        The matched user, or ``None`` if no match is found.
    ```

- id: missing-return-type
  name: Missing Return Type
  check: enrichment
  category: recommended
  applies_to: functions, methods
  summary: Returns section has no type and function has no return annotation
  since: "1.14.0"
  fix: |
    Add a type to the `Returns:` entry:

    ```python
    Returns:
        dict: The parsed configuration as a dictionary.
    ```

    Or add a return annotation to the function signature:

    ```python
    def parse_config(path: str) -> dict:
    ```

    Either approach is sufficient — you don't need both.

- id: missing-param-in-docstring
  name: Missing Parameter in Docstring
  check: enrichment
  category: required
  applies_to: functions, methods
  summary: Signature parameter not documented in Args section
  since: "1.14.0"
  fix: |
    Add the missing parameter to the `Args:` section with a description:

    ```python
    Args:
        host: The server hostname.
        port: The server port number.
        timeout: Connection timeout in seconds. Defaults to 30.0.
    ```

- id: extra-param-in-docstring
  name: Extra Parameter in Docstring
  check: enrichment
  category: required
  applies_to: functions, methods
  summary: Args section documents a parameter not in the function signature
  since: "1.14.0"
  fix: |
    Remove the stale `Args:` entry that no longer matches a signature parameter:

    ```python
    Args:
        host: The server hostname.
        port: The server port number.
    ```

- id: extra-raises-in-docstring
  name: Extra Raises in Docstring
  check: enrichment
  category: recommended
  applies_to: functions, methods
  summary: Docstring documents exceptions not raised in the function body
  since: "1.16.0"
  fix: |
    Remove the documented exception from the `Raises:` section, or add the
    corresponding `raise` statement to the function body:

    ```python
    Raises:
        ValueError: If the input is invalid.
    ```

    Only document exceptions that the function **directly** raises. Exceptions
    from called functions should be documented in **their** docstrings.

- id: extra-yields-in-docstring
  name: Extra Yields in Docstring
  check: enrichment
  category: recommended
  applies_to: functions, methods
  summary: Docstring has a Yields section but the function does not yield
  since: "1.16.0"
  fix: |
    Remove the `Yields:` section or convert the function to a generator:

    If the function was refactored from a generator to a regular function,
    replace `Yields:` with `Returns:`:

    ```python
    Returns:
        A list of processed items.
    ```

- id: extra-returns-in-docstring
  name: Extra Returns in Docstring
  check: enrichment
  category: recommended
  applies_to: functions, methods
  summary: Docstring has a Returns section but the function does not return a value
  since: "1.16.0"
  fix: |
    Remove the `Returns:` section if the function has no meaningful return value:

    ```python
    def save(data: dict) -> None:
        """Save data to disk."""
    ```

    If the function should return a value, add the `return` statement.

- id: missing-deprecation
  name: Missing Deprecation Notice
  check: enrichment
  category: required
  applies_to: functions, methods
  summary: Function uses deprecation patterns but has no deprecation notice in docstring
  since: "1.15.0"
  fix: |
    Add a deprecation notice to the docstring. The word "deprecated" must appear
    somewhere in the docstring (case-insensitive). Common formats:

    Google-style:

    ```python
    Deprecated:
        Use :func:`new_func` instead. Will be removed in v3.0.
    ```

    Sphinx-style:

    ```python
    .. deprecated:: 2.0
        Use :func:`new_func` instead.
    ```

    Inline:

    ```python
    """Connect to the server (deprecated — use connect_async)."""
    ```

- id: missing-yields
  name: Missing Yields Section
  check: enrichment
  category: required
  applies_to: functions, methods
  summary: Generator yields values but has no Yields section
  since: "1.0.0"
  fix: |
    Add a `Yields:` section describing the type and meaning of each yielded value:

    ```python
    Yields:
        Row data as a dictionary with column names as keys.
    ```

- id: missing-receives
  name: Missing Receives Section
  check: enrichment
  category: required
  applies_to: functions, methods
  summary: Generator uses send pattern but has no Receives section
  since: "1.0.0"
  fix: |
    Add a `Receives:` section describing the value accepted via `.send()`:

    ```python
    Receives:
        Numeric value to add to the running total.
    ```

- id: missing-warns
  name: Missing Warns Section
  check: enrichment
  category: required
  applies_to: functions, methods
  summary: Function calls warnings.warn() but has no Warns section
  since: "1.0.0"
  fix: |
    Add a `Warns:` section listing each warning category and its trigger condition:

    ```python
    Warns:
        UserWarning: If timeout is less than 5 seconds.
        DeprecationWarning: If the legacy API flag is set.
    ```

- id: missing-other-parameters
  name: Missing Other Parameters Section
  check: enrichment
  category: recommended
  applies_to: functions, methods
  summary: Function accepts **kwargs but has no Other Parameters section
  since: "1.0.0"
  fix: |
    Add an `Other Parameters:` section documenting the keyword arguments passed via `**kwargs`:

    ```python
    Other Parameters:
        timeout (int): Request timeout in seconds. Defaults to 30.
        retries (int): Number of retry attempts. Defaults to 3.
    ```

- id: missing-attributes
  name: Missing Attributes Section
  check: enrichment
  category: required
  applies_to: classes, modules
  summary: Class or module has undocumented attributes
  since: "1.0.0"
  fix: |
    Add an `Attributes:` section listing each public attribute with its type and description:

    ```python
    Attributes:
        name (str): The user's display name.
        email (str): The user's email address.
        role (str): The user's role. Defaults to "viewer".
    ```

- id: missing-typed-attributes
  name: Missing Typed Attributes
  check: enrichment
  category: recommended
  applies_to: classes
  summary: "Attributes: entries lack `name (type): description` format"
  since: "1.0.0"
  fix: |
    Add the type in parentheses to each `Attributes:` entry using `name (type): description` format:

    ```python
    Attributes:
        host (str): The server hostname.
        port (int): The server port number.
    ```

- id: missing-examples
  name: Missing Examples Section
  check: enrichment
  category: recommended
  applies_to: classes, modules
  summary: Class or type that requires examples has no Examples section
  since: "1.0.0"
  fix: |
    Add an `Examples:` section with a fenced code block showing basic usage:

    ```python
    Examples:
        ```python
        coord = Coordinate(latitude=40.7128, longitude=-74.0060)
        print(coord.latitude)  # 40.7128
        ```
    ```

- id: missing-cross-references
  name: Missing Cross-References
  check: enrichment
  category: recommended
  applies_to: modules
  summary: Module See Also section missing or lacking properly formatted cross-references
  since: "1.0.0"
  fix: |
    Add a `See Also:` section with bracket-style cross-references that render as clickable links:

    ```python
    See Also:
        [`myapp.utils.parsing`][]: String and data parsing helpers.
        [`myapp.utils.validation`][]: Input validation utilities.
    ```

- id: prefer-fenced-code-blocks
  name: Prefer Fenced Code Blocks
  check: enrichment
  category: recommended
  applies_to: any symbol
  summary: Examples section uses doctest (`>>>`) or reStructuredText (`::`) indented code blocks instead of fenced code blocks
  since: "1.0.0"
  fix: |
    Replace doctest `>>>` format or rST `::` indented blocks with triple-backtick fenced code blocks and a language marker:

    **Doctest `>>>` format:**

    ```python
    Examples:
        ```python
        add(1, 2)  # returns 3
        add(-1, 1)  # returns 0
        ```
    ```

    **rST `::` indented block** — remove `::` from the directive line and wrap the code in fenced backticks:

    ```python
    Examples:
        Run the check:

        ```bash
        $ docvet check --all
        ```
    ```

- id: stale-signature
  name: Stale Signature
  check: freshness
  category: required
  applies_to: functions, methods
  summary: Function signature changed but docstring not updated
  since: "1.0.0"
  fix: |
    The function signature changed but the docstring was not updated.
    Review the current parameters, default values, and return type, then
    update the `Args:`, `Returns:`, and summary line to match the new signature.

- id: stale-body
  name: Stale Body
  check: freshness
  category: recommended
  applies_to: functions, methods
  summary: Function body changed but docstring not updated
  since: "1.0.0"
  fix: |
    The function body changed but the docstring was not updated.
    Review the current implementation for new branches, changed return values,
    or altered side effects, then update the docstring description, `Returns:`,
    and `Raises:` sections to reflect the actual behavior.

- id: stale-import
  name: Stale Import
  check: freshness
  category: recommended
  applies_to: functions, methods
  summary: Import or formatting changed but docstring not updated
  since: "1.0.0"
  fix: |
    Imports or formatting changed near this function but the docstring was not updated.
    Review whether the import change affects documented behavior (e.g., a dependency
    swap or new library) and update the docstring summary or description if needed.

- id: stale-drift
  name: Stale Drift
  check: freshness
  category: recommended
  applies_to: functions, methods, classes
  summary: Code modified more recently than docstring beyond drift threshold
  since: "1.0.0"
  fix: |
    The code has been modified more recently than the docstring by more than the
    configured drift threshold. Review the entire docstring against the current
    implementation and update the summary, `Args:`, `Returns:`, and any other
    sections to accurately describe the current behavior.

- id: stale-age
  name: Stale Age
  check: freshness
  category: recommended
  applies_to: functions, methods, classes
  summary: Docstring untouched beyond age threshold
  since: "1.0.0"
  fix: |
    The docstring has not been updated for longer than the configured age threshold.
    Review the entire docstring for accuracy — even small wording improvements reset
    the age counter. Confirm the summary, parameters, return values, and examples
    still reflect current behavior.

- id: missing-init
  name: Missing __init__.py
  check: coverage
  category: required
  applies_to: directories
  summary: Directory in source tree lacks __init__.py file
  since: "1.0.0"
  fix: |
    Create an `__init__.py` file in the directory with a module docstring:

    ```python
    """Subpackage for handling configuration parsing."""
    ```

- id: overload-has-docstring
  name: Overloaded Function Has Docstring
  check: presence
  category: required
  applies_to: functions, methods
  summary: "@overload-decorated function has a docstring — document the implementation instead"
  since: "1.13.0"
  fix: |
    Remove the docstring from the `@overload`-decorated function and document the implementation
    function instead. Documentation on overloads is ignored by `help()`, IDEs, and doc generators.

    ```python
    @overload
    def connect(address: str) -> TCPConnection: ...

    @overload
    def connect(address: tuple[str, int]) -> TCPConnection: ...

    def connect(address: str | tuple[str, int]) -> TCPConnection:
        """Connect to a server.

        Args:
            address: Hostname string or (host, port) tuple.

        Returns:
            An established connection.
        """
        ...
    ```

- id: missing-docstring
  name: Missing Docstring
  check: presence
  category: required
  applies_to: modules, classes, functions, methods
  summary: Public symbol has no docstring
  since: "1.7.0"
  fix: |
    Add a docstring to the symbol. For functions, include a summary line and document
    parameters, return values, and exceptions:

    ```python
    def parse_config(path: str) -> dict:
        """Parse a TOML configuration file.

        Args:
            path: Path to the configuration file.

        Returns:
            Parsed configuration as a dictionary.

        Raises:
            FileNotFoundError: If the file does not exist.
        """
    ```

    For classes, describe the purpose and list public attributes:

    ```python
    class UserProfile:
        """User profile with display preferences.

        Attributes:
            name (str): The user's display name.
            theme (str): Preferred color theme.
        """
    ```

    For modules, add a module-level docstring at the top of the file:

    ```python
    """Utility functions for configuration parsing."""
    ```

- id: griffe-unknown-param
  name: Griffe Unknown Parameter
  check: griffe
  category: required
  applies_to: functions, methods
  summary: Docstring documents a parameter not in the function signature
  since: "1.0.0"
  fix: |
    Remove or rename the documented parameter that does not exist in the function signature.
    Check if the parameter was renamed during a refactor and update the `Args:` entry to
    match the current parameter name, or delete the entry if the parameter was removed.

- id: griffe-missing-type
  name: Griffe Missing Type
  check: griffe
  category: recommended
  applies_to: functions, methods
  summary: Parameter or return value lacks type annotation in docstring
  since: "1.0.0"
  fix: |
    Add the type in parentheses using `name (type): description` format in `Args:` entries,
    or add the type on a separate line in the `Returns:` section:

    ```python
    Args:
        name (str): The user's display name.

    Returns:
        User: The created user object.
    ```

- id: griffe-format-warning
  name: Griffe Format Warning
  check: griffe
  category: recommended
  applies_to: any symbol
  summary: Docstring format issue that would break mkdocs rendering
  since: "1.0.0"
  fix: |
    Fix the formatting issue identified by griffe's parser. Common fixes include:

    - Indent section entries by 4 spaces under the section header
    - Use the exact section header format (e.g., `Args:` not `Arguments:`)
    - Ensure a blank line between sections

- id: undocumented-init-params
  name: Undocumented Init Parameters
  check: enrichment
  category: required
  applies_to: classes
  summary: "Class __init__ has parameters but no Args section in class or __init__ docstring"
  since: "1.14.0"
  fix: |
    Add an `Args:` section documenting the constructor parameters in either the
    class docstring or the `__init__` docstring:

    ```python
    class Server:
        """A network server.

        Args:
            host: The server hostname.
            port: The server port number.
        """
    ```

    Or document them in the `__init__` docstring instead:

    ```python
    def __init__(self, host, port):
        """Initialize the server.

        Args:
            host: The server hostname.
            port: The server port number.
        """
    ```

    Either location is sufficient — you don't need both.

- id: scaffold-incomplete
  name: Scaffold Incomplete
  check: enrichment
  category: scaffold
  applies_to: any symbol
  summary: Docstring contains unfilled [TODO] placeholder markers from docvet fix
  since: "1.15.0"
  fix: |
    Replace the `[TODO: ...]` placeholder markers with real descriptions:

    ```python
    # Before (scaffold placeholder)
    Raises:
        ValueError: [TODO: describe when this is raised]

    # After (filled in)
    Raises:
        ValueError: When the input data is empty or None.
    ```

- id: trivial-docstring
  name: Trivial Docstring
  check: enrichment
  category: recommended
  applies_to: any symbol
  summary: Docstring summary line restates the symbol name without adding information
  since: "1.14.0"
  fix: |
    Replace the summary line with a description that adds information beyond
    the symbol name — explain behaviour, constraints, or return value:

    ```python
    # Before (trivial)
    def get_user():
        """Get user."""

    # After (informative)
    def get_user():
        """Fetch the active user from the session cache by primary key."""
    ```
